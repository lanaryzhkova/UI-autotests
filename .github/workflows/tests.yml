name: Run Tests and Publish Allure Report

on:
  push:
    branches: [ task-2 ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: browser-actions/setup-chrome@v1

      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-xdist allure-pytest

      - run: pytest -n auto --alluredir=allure-results || true

      - run: |
          sudo apt-get update
          sudo apt-get install -y default-jre

          curl -L -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/bin/allure

          allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          force_orphan: true